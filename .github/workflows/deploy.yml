name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-brooks-prequel
  cancel-in-progress: false

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.GCP_ARTIFACT_REPOSITORY }}
  ENV_SECRET_NAME: ${{ secrets.GCP_ENV_SECRET_NAME }}
  VM_HOST: ${{ secrets.GCP_VM_HOST }}
  APP_ROOT: /opt/brooks

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log deployment metadata
        run: |
          set -euo pipefail
          echo "::group::deployment-metadata"
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Ref: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"
          echo "Actor: $GITHUB_ACTOR"
          echo "Project ID length: ${#PROJECT_ID}"
          echo "Region: ${REGION}"
          echo "Repository: ${REPOSITORY}"
          echo "VM host present: $([ -n "${VM_HOST}" ] && echo yes || echo no)"
          echo "::endgroup::"

      - name: Validate required GitHub configuration
        run: |
          set -euo pipefail
          required=(PROJECT_ID REGION REPOSITORY ENV_SECRET_NAME VM_HOST)
          for key in "${required[@]}"; do
            value="${!key:-}"
            if [ -z "$value" ]; then
              echo "ERROR: missing required GitHub secret/variable: $key"
              exit 1
            fi
          done

      - name: SSH handshake
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 30s
          script: |
            set -euo pipefail
            echo "SSH handshake successful"
            echo "Host: $(hostname)"
            echo "User: $(whoami)"
            echo "UTC time: $(date -u)"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          set -euo pipefail
          echo "::group::artifact-registry-auth"
          gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet
          echo "::endgroup::"

      - name: Fetch production env from Secret Manager
        run: |
          set -euo pipefail
          echo "::group::fetch-secret-manager-env"
          gcloud secrets versions access latest \
            --secret="${ENV_SECRET_NAME}" \
            --project="${PROJECT_ID}" > .env.production
          [ -s .env.production ] || { echo "ERROR: .env.production is empty after secret fetch"; exit 1; }
          echo "Fetched env payload bytes: $(wc -c < .env.production)"
          echo "::endgroup::"

      - name: Validate production env
        run: |
          set -euo pipefail
          chmod +x infra/scripts/validate-env.sh
          infra/scripts/validate-env.sh .env.production

      - name: Build and push backend image
        env:
          IMAGE_PATH: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/brooks-prequel-backend
        run: |
          set -euo pipefail
          echo "::group::build-backend"
          echo "Building ${IMAGE_PATH}:${GITHUB_SHA}"
          docker build \
            --progress=plain \
            -t "${IMAGE_PATH}:${GITHUB_SHA}" \
            -t "${IMAGE_PATH}:latest" \
            backend/
          echo "::endgroup::"
          echo "::group::push-backend"
          docker push "${IMAGE_PATH}:${GITHUB_SHA}"
          docker push "${IMAGE_PATH}:latest"
          echo "::endgroup::"
          echo "BROOKS_BACKEND_IMAGE=${IMAGE_PATH}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Build and push web image
        env:
          IMAGE_PATH: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPOSITORY }}/brooks-prequel-web
        run: |
          set -euo pipefail
          echo "::group::build-web"
          get_env() {
            local key="$1"
            grep -E "^${key}=" .env.production | head -n 1 | cut -d'=' -f2-
          }
          echo "Building ${IMAGE_PATH}:${GITHUB_SHA}"
          docker build \
            --progress=plain \
            --build-arg NEXT_PUBLIC_API_BASE_URL="$(get_env NEXT_PUBLIC_API_BASE_URL)" \
            --build-arg NEXT_PUBLIC_AUTH0_DOMAIN="$(get_env NEXT_PUBLIC_AUTH0_DOMAIN)" \
            --build-arg NEXT_PUBLIC_AUTH0_CLIENT_ID="$(get_env NEXT_PUBLIC_AUTH0_CLIENT_ID)" \
            --build-arg NEXT_PUBLIC_AUTH0_AUDIENCE="$(get_env NEXT_PUBLIC_AUTH0_AUDIENCE)" \
            --build-arg NEXT_PUBLIC_MAPBOX_PUBLIC_TOKEN="$(get_env NEXT_PUBLIC_MAPBOX_PUBLIC_TOKEN)" \
            --build-arg NEXT_PUBLIC_MAPBOX_STYLE="$(get_env NEXT_PUBLIC_MAPBOX_STYLE)" \
            -t "${IMAGE_PATH}:${GITHUB_SHA}" \
            -t "${IMAGE_PATH}:latest" \
            web/
          echo "::endgroup::"
          echo "::group::push-web"
          docker push "${IMAGE_PATH}:${GITHUB_SHA}"
          docker push "${IMAGE_PATH}:latest"
          echo "::endgroup::"
          echo "BROOKS_WEB_IMAGE=${IMAGE_PATH}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Prepare runtime env file
        run: |
          set -euo pipefail
          cp .env.production .env.runtime
          {
            echo "BROOKS_BACKEND_IMAGE=${BROOKS_BACKEND_IMAGE}"
            echo "BROOKS_WEB_IMAGE=${BROOKS_WEB_IMAGE}"
          } >> .env.runtime
          echo "::group::runtime-env-summary"
          echo "BROOKS_BACKEND_IMAGE=${BROOKS_BACKEND_IMAGE}"
          echo "BROOKS_WEB_IMAGE=${BROOKS_WEB_IMAGE}"
          echo "Runtime env lines: $(wc -l < .env.runtime)"
          echo "::endgroup::"

      - name: Prepare remote directories
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 120s
          script: |
            set -euo pipefail
            APP_ROOT="${{ env.APP_ROOT }}"
            sudo mkdir -p "${APP_ROOT}/infra/postgres" "${APP_ROOT}/infra/scripts"
            sudo chown -R "$(whoami):$(whoami)" "${APP_ROOT}"

      - name: Upload deployment files
        id: upload
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 180s
          overwrite: true
          source: ".env.runtime,infra/docker-compose.prod.yml,infra/Caddyfile.prod,infra/postgres/init.sql,infra/scripts/diagnostics.sh,infra/scripts/setup-vm.sh"
          target: ${{ env.APP_ROOT }}/

      - name: Retry upload after handshake
        if: steps.upload.outcome == 'failure'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 180s
          overwrite: true
          source: ".env.runtime,infra/docker-compose.prod.yml,infra/Caddyfile.prod,infra/postgres/init.sql,infra/scripts/diagnostics.sh,infra/scripts/setup-vm.sh"
          target: ${{ env.APP_ROOT }}/

      - name: Deploy on VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 300s
          command_timeout: 1800s
          script: |
            set -euo pipefail

            APP_ROOT="${{ env.APP_ROOT }}"
            REGION="${{ env.REGION }}"
            ENV_FILE="${APP_ROOT}/.env.runtime"
            COMPOSE_FILE="${APP_ROOT}/infra/docker-compose.prod.yml"
            CADDY_SOURCE="${APP_ROOT}/infra/Caddyfile.prod"
            CADDY_TARGET="${APP_ROOT}/infra/Caddyfile"

            log_section() {
              printf '\n===== %s =====\n' "$1"
            }

            docker_cmd() {
              if docker info >/dev/null 2>&1; then
                docker "$@"
              else
                sudo docker "$@"
              fi
            }

            compose_cmd() {
              if docker info >/dev/null 2>&1; then
                docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" "$@"
              else
                sudo docker compose --env-file "$ENV_FILE" -f "$COMPOSE_FILE" "$@"
              fi
            }

            fail_with_context() {
              local message="$1"
              echo "ERROR: ${message}"
              chmod +x "${APP_ROOT}/infra/scripts/diagnostics.sh" || true
              "${APP_ROOT}/infra/scripts/diagnostics.sh" "$ENV_FILE" "$COMPOSE_FILE" || true
              exit 1
            }

            trap 'fail_with_context "VM deploy step failed"' ERR

            log_section "preflight"
            [ -f "$ENV_FILE" ] || fail_with_context "missing runtime env file"
            [ -f "$COMPOSE_FILE" ] || fail_with_context "missing compose file"
            [ -f "$CADDY_SOURCE" ] || fail_with_context "missing prod caddy file"
            cp "$CADDY_SOURCE" "$CADDY_TARGET"
            chmod +x "${APP_ROOT}/infra/scripts/diagnostics.sh" "${APP_ROOT}/infra/scripts/setup-vm.sh" || true
            df -h
            free -m

            log_section "docker availability"
            command -v docker >/dev/null 2>&1 || fail_with_context "docker not installed on VM"
            docker_cmd info >/dev/null 2>&1 || fail_with_context "docker daemon unavailable"

            log_section "artifact registry login"
            REGISTRY="${REGION}-docker.pkg.dev"
            TOKEN="$(
              curl -fsS -H 'Metadata-Flavor: Google' \
                'http://metadata.google.internal/computeMetadata/v1/instance/service-accounts/default/token' \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['access_token'])"
            )"
            [ -n "$TOKEN" ] || fail_with_context "failed to obtain VM metadata token"
            printf '%s' "$TOKEN" | docker_cmd login -u oauth2accesstoken --password-stdin "https://${REGISTRY}"

            log_section "compose validation"
            compose_cmd config >/tmp/brooks-compose-rendered.yml
            tail -n 40 /tmp/brooks-compose-rendered.yml || true

            log_section "pull images"
            compose_cmd pull

            log_section "start postgres first"
            compose_cmd up -d postgres
            for attempt in $(seq 1 24); do
              if docker_cmd inspect -f '{{.State.Health.Status}}' brooks-postgres 2>/dev/null | grep -q '^healthy$'; then
                echo "Postgres is healthy"
                break
              fi
              echo "Postgres not healthy yet (attempt ${attempt}/24)"
              sleep 5
              if [ "$attempt" -eq 24 ]; then
                fail_with_context "postgres failed health check"
              fi
            done

            log_section "start backend and web"
            compose_cmd up -d backend web

            log_section "wait for backend"
            for attempt in $(seq 1 24); do
              if curl -fsS --max-time 10 http://127.0.0.1:8080/actuator/health >/dev/null 2>&1; then
                echo "Backend health check passed via localhost publish path"
                break
              fi
              backend_ip="$(docker_cmd inspect -f '{{with index .NetworkSettings.Networks "internal"}}{{.IPAddress}}{{end}}' brooks-backend 2>/dev/null || true)"
              if [ -n "$backend_ip" ] && curl -fsS --max-time 10 "http://${backend_ip}:8080/actuator/health" >/dev/null 2>&1; then
                echo "Backend health check passed via bridge IP ${backend_ip}"
                break
              fi
              echo "Backend not healthy yet (attempt ${attempt}/24)"
              docker_cmd logs brooks-backend --tail 40 || true
              sleep 5
              if [ "$attempt" -eq 24 ]; then
                fail_with_context "backend failed health check"
              fi
            done

            log_section "start caddy"
            compose_cmd up -d caddy

            log_section "compose status"
            compose_cmd ps

            log_section "caddy health"
            for attempt in $(seq 1 18); do
              if curl -fsS --max-time 10 http://127.0.0.1/health >/dev/null 2>&1; then
                echo "Caddy health endpoint passed"
                break
              fi
              echo "Caddy not healthy yet (attempt ${attempt}/18)"
              docker_cmd logs brooks-caddy --tail 40 || true
              sleep 5
              if [ "$attempt" -eq 18 ]; then
                fail_with_context "caddy failed health check"
              fi
            done

      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.VM_HOST }}
          username: ${{ secrets.GCP_VM_USER }}
          key: ${{ secrets.GCP_VM_SSH_KEY }}
          port: 22
          timeout: 120s
          command_timeout: 600s
          script: |
            set -euo pipefail
            APP_ROOT="${{ env.APP_ROOT }}"
            ENV_FILE="${APP_ROOT}/.env.runtime"
            DOMAIN="$(grep -E '^DOMAIN=' "$ENV_FILE" | cut -d'=' -f2-)"
            echo "Smoke testing domain: ${DOMAIN}"
            curl -fsS --max-time 15 "http://127.0.0.1/health"
            curl -fsS --max-time 15 "http://127.0.0.1:8080/actuator/health" || true
            if [ -n "${DOMAIN}" ]; then
              curl -IkfsS --max-time 20 "https://${DOMAIN}" || true
            fi
